<!DOCTYPE html>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">

<body>

  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-mark"></span>
      DARK MOON

    <nav class="site-nav">
      <a href="story.html">Story</a>

  <main class="world-main">
    <section class="world-section">
      <div class="section-container">
        
        <div class="world-header">
          <p class="eyebrow">World Map</p>
          <h2>기사들이 사냥당하는 암흑의 도시</h2>
        </div>

       <div class="map-layout">
          <div class="map-visual" aria-label="World map terminal">
            <div class="radar-scan"></div>
            <span class="map-node riverfield active" data-loc="riverfield">Riverfield</span>
            <span class="map-node printanier" data-loc="printanier">Printanier</span>
            <span class="map-node autumbal" data-loc="autumbal">Autumbal</span>
            <span class="map-node hivernal" data-loc="hivernal">Hivernal</span>
          </div>

          <div id="location-detail-panel" class="location-detail-panel">
            </div>
        </div>


      </div>
    </section>
  </main>
