<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DARK MOON | Welcome Princess</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blood-red: #e6192b;
      --text: #f6eef1;
      --muted: #c5b8bc;
      --line: rgba(230, 25, 43, 0.3);
      --gold: #d8b56d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Noto Serif KR", serif;
      background:
        linear-gradient(rgba(5, 1, 2, 0.56), rgba(5, 1, 2, 0.94)),
        url("images/princess.jpg") center / cover fixed no-repeat;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .welcome {
      width: min(820px, 100%);
      text-align: center;
      padding: clamp(46px, 8vw, 84px) clamp(22px, 5vw, 62px);
      border: 1px solid var(--line);
      background: rgba(8, 2, 5, 0.78);
      backdrop-filter: blur(14px);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.55);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--gold);
      font: 800 0.88rem "Cinzel", serif;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 22px;
      font: 800 clamp(2.8rem, 8vw, 6.2rem) / 0.95 "Cinzel", serif;
      text-shadow: 0 0 32px rgba(230, 25, 43, 0.55), 2px 2px 0 #000;
    }

    .welcome p {
      margin: 0 auto 28px;
      max-width: 560px;
      color: var(--muted);
      line-height: 1.85;
      font-size: 1.05rem;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    a,
    button {
      min-width: 150px;
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--blood-red);
      color: #fff;
      background: rgba(230, 25, 43, 0.18);
      text-decoration: none;
      font: 800 0.9rem "Noto Serif KR", serif;
      cursor: pointer;
    }

    .primary {
      background: var(--blood-red);
      box-shadow: 0 0 28px rgba(230, 25, 43, 0.25);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.68);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-box {
      width: min(460px, 100%);
      border: 1px solid rgba(230, 25, 43, 0.45);
      background: rgba(12, 3, 6, 0.94);
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.6);
      padding: 30px;
      text-align: center;
    }

    .modal-box h2 {
      margin: 0 0 12px;
      font: 800 1.7rem "Cinzel", serif;
      letter-spacing: 1.5px;
    }

    .modal-box p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main class="welcome">
    <p class="eyebrow">Welcome To Dark Moon</p>
    <h1 id="hero-title">Welcome,<br>Princess</h1>
    <p>가입이 완료되었습니다. 붉은 달 아래에서 당신의 기록이 시작됩니다.</p>
    <div class="button-row">
      <a class="primary" href="index.html">메인으로</a>
      <a href="princess.html">가입 페이지</a>
    </div>
  </main>

  <div class="modal" id="welcome-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
      <h2 id="modal-title">가입을 환영합니다</h2>
      <p id="modal-copy">DARK MOON 계정 등록이 완료되었습니다.</p>
      <button class="primary" id="close-modal" type="button">확인</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const username = params.get("username") || sessionStorage.getItem("princessUsername") || "Princess";
    const modal = document.getElementById("welcome-modal");

    document.getElementById("hero-title").innerHTML = `Welcome,<br>${escapeHtml(username)}`;
    document.getElementById("modal-copy").textContent = `${username}님, DARK MOON 가입이 완료되었습니다.`;

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    window.addEventListener("load", () => {
      modal.classList.add("show");
    });

    document.getElementById("close-modal").addEventListener("click", () => {
      modal.classList.remove("show");
    });
  </script>
</body>
</html>
